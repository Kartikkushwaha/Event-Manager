<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventEase Form</title>

    <!-- css file start -->
    <style>

      /* day/night mode */

      :root{

    --bg:#f4f7fc;

    --navbar:white;

    --card:white;

    --text:#333;

    --secondaryText:gray;

    --shadow:0 5px 15px rgba(0,0,0,0.08);
      }

    .dark-mode{

    --bg:#0f172a;

    --navbar:#1e293b;

    --card:#334155;

    --text:#f8fafc;

    --secondaryText:#cbd5e1;

    --shadow:0 5px 20px rgba(0,0,0,0.4);

    }
        /* Base Reset & Background */
      
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background:var(--bg);
            transition:.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* welcome text */
        #welcome{
            font-size: xxx-large;
            color:var(--text);
            margin: 40px auto;
            font-family:'Times New Roman', Times, serif;
        }
        /* create your event */
        #crtyrevent{
            font-size: x-large;
            color:var(--text);
            margin: 10px auto;
            font-family:'Times New Roman', Times, serif;
        }

        /* Top Navigation Bar */
        nav {
            width: 100%;
            background:var(--navbar);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        nav .logo {
            font-size: 28px;
            font-weight: bold;
            color: #2563eb;
        }

        nav .theme-btn {
            background: #2563eb;
            border: 1px solid #ccc;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        nav .theme-btn:hover {
            background-color: #f0f0f0;
        }

        /* Main Form Container (Second-largest box) */
        .form-container {
            background:var(--card);
            color:var(--text);
            width: 90%;
            max-width: 1000px;
            margin: 60px auto;
            padding: 40px;
            border-radius: 20px;
            /* Shadow effects at border */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Form Group styling for Labels + Select inputs */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group h3, .form-group label {
            font-size: 1.0rem;
            color:var(--text);
            font-weight: 700;
        }

        /* Dropdown Select Styling */
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background-color: #fff;
            font-size: 0.90rem;
            color: #333;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: #3182ce;
        }

        /* Bottom Grid for the 4 smaller dropdowns */
        .dropdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        /* Responsive design for smaller screens */
        @media (max-width: 768px) {
            .dropdown-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 480px) {
            .dropdown-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Save Button Styling at Rightmost-Bottom */
        .button-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }

        .save-btn {
            background-color: #3182ce;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .save-btn:hover {
            background-color: #2b6cb0;
        }
    </style>
    <!-- css file ends -->
     
</head>
<body>

    <nav>
        <div class="logo">✨ EventEase</div>
        <button class="theme-btn" id="themeToggle">🌙</button>
    </nav>
    <div id="welcome"><b>Welcome!</b></div>
    <div id="crtyrevent">Create your Event..</div>

    <div class="form-container">
        
        <div class="form-group">
            <h3>Name of the Event:</h3>
            <form>
                <input id="name" type="text" style="height: 40px; width: 80%;" placeholder="Ex-Wedding Celebration">
            </form>

        </div>

        <div class="dropdown-grid">
            
            <div class="form-group">
                <label>Choose the Type of Event</label>
                <select id="eventType" name="event-type">
                    <option value="" disabled selected>Select type...</option>
                    <option value="traditional">Traditional</option>
                    <option value="modern">Modern</option>
                    <option value="custom">Custom</option>
                    
                </select>
            </div>

            <div class="form-group">
                <label>Choose the State/Residence (India)</label>
                <select id="state" name="state-residence">
                    <option value="" disabled selected>Select state...</option>
                    <!-- selecting states -->
                    <option value="ny">Andhra Pradesh</option>
                    <option value="ca">Arunchal Pradesh</option>
                    <option value="tx">Assam</option>
                    <option value="br">Bihar</option>
                    <option value="cht">Chattisgarh</option>
                    <option value="go">Goa</option>
                    <option value="gj">Gujarat</option>
                    <option value="hr">Haryana</option>
                    <option value="hp">Himanchal Pradesh</option>
                    <option value="jk">Jharkhand</option>
                    <option value="kt">Karnataka</option>
                    <option value="kr">Kerala</option>
                    <option value=""mp>Madhya Pradesh</option>
                    <option value=""mh>Maharastra</option>
                    <option value="mn">Manipur</option>
                    <option value="mg">Meghalaya</option>
                    <option value="mz">Mizoram</option>
                    <option value="ng">Nagaland</option>
                    <option value="od">Odisha</option>
                    <option value="fl">Punjab</option>
                    <option value="fl">Rajasthan</option>
                    <option value="fl">Sikkim</option>
                    <option value="fl">Tamil Nadu</option>
                    <option value="fl">Telangana</option>
                    <option value="fl">Tripura</option>
                    <option value="fl">Uttar Pradesh</option>
                    <option value="fl">Uttrakhand</option>
                    <option value="fl">West bengal</option>
                    
                    <!-- selecting union territories -->
                    
                    <option value="an">Andaman and Nicobar</option>
                    <option value="chn">Chandigarh</option>
                    <option value="dnhdd">Dadra and Nagar Haveli and Daman and Diu</option>
                    <option value="dl">Delhi(NCT)</option>
                    <option value="jk">Jammu & Kashmir</option>
                    <option value="lkh">Ladakh</option>
                    <option value="lks">Lakshadweep</option>
                    <option value="pd">Puducherry</option>
                    
                </select>
            </div>

            <div class="form-group">
                <label>Choose the Events</label>
                <select id="eventCategory" name="specific-event">
                    <option value="" disabled selected>Select state...</option>
                    <option value="corporate">Wedding</option>
                    <option value="Birthday">Birthday</option>
                    <option value="Baby shower">Baby shower</option>
                    <option value="Corporate">Corporate</option>
                    <option value="Farewell">Farewell</option>
                    <option value="College Fest">College Fest</option>
                    <option value="Anniversary">Anniversary</option>
                    <option value="Valentine">Valentine</option>
                    <option value="Custom">Custom</option>
                </select>
            </div>

            <div class="form-group">
                <label>Number of Invitations</label>
                <select id="guestCount" name="invitation-count">
                    <option value="" disabled selected>Select count...</option>
                    <option value="1-50">1 - 50</option>
                    <option value="51-200">51 - 200</option>
                    <option value="201-500">201 - 500</option>
                    <option value="500-1000">500-1000</option>
                    <option value="custom">Custom</option>
                </select>
            </div>

        </div>

        <div class="button-wrapper">
            <button id="saveBtn" type="button" class="save-btn">Save</button>
        </div>

    </div>
    <script type="module" src="dash_dashboard.js"></script>

</body>
</html>
